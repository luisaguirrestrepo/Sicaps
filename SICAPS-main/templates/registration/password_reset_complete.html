<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contraseña restablecida - SICAPS</title>
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-background: #e9eff6;
            --color-sura-blue: #0b4a88;
            --color-sura-cyan: #0ea5e9;
            --color-sura-cyan-dark: #0284c7;
            --color-text: #102a43;
            --color-surface: #ffffff;
        }
        body {
            background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.14), transparent 30%), var(--color-background);
            color: var(--color-text);
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-[var(--color-background)] font-sans antialiased flex items-center justify-center min-h-screen py-10">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl shadow-blue-900/5 p-8 border border-gray-100 text-center">
        <h1 class="text-3xl font-bold text-[var(--color-sura-blue)] tracking-tight">Contraseña actualizada</h1>
        <p class="text-gray-500 mt-4">Tu contraseña se ha cambiado correctamente. Ahora puedes iniciar sesión con la nueva contraseña.</p>
        <a href="{% url 'login' %}" class="inline-block mt-8 px-6 py-3 bg-[var(--color-sura-blue)] text-white rounded-xl hover:bg-[var(--color-sura-cyan-dark)] transition-all">Volver a iniciar sesión</a>
    </div>
</body>
</html>
