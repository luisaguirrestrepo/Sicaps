{% extends 'base.html' %}

{% block title %}Editar Psicólogo - SICAPS{% endblock %}

{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-2xl">
    <h2 class="text-2xl font-bold mb-4">Editar Psicólogo</h2>

    <form method="post" action="">
        {% csrf_token %}
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-semibold">Nombre completo</label>
                {{ form.nombre_completo }}
            </div>
            <div>
                <label class="block text-sm font-semibold">Correo</label>
                {{ form.email }}
            </div>
            <div>
                <label class="block text-sm font-semibold">Teléfono</label>
                {{ form.telefono }}
            </div>
            <div>
                <label class="block text-sm font-semibold">Tarjeta profesional</label>
                {{ form.tarjeta_profesional }}
            </div>
            <div>
                <label class="inline-flex items-center">
                    {{ form.disponible }}
                    <span class="ml-2 text-sm">Disponible</span>
                </label>
            </div>
        </div>
        <div class="mt-6 flex space-x-3">
            <button type="submit" class="px-4 py-2 bg-[var(--color-sura-cyan)] text-white rounded-lg">Guardar</button>
            <a href="{% url 'core:psicologos' %}" class="px-4 py-2 bg-gray-100 rounded-lg">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
