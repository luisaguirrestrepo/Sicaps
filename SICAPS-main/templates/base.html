<!DOCTYPE html>
<html lang="es-co">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SICAPS - Gestión de Consultorios{% endblock %}</title>
    {% load static %}
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <form method="POST">
    {% csrf_token %}
``
    <style>
        :root {
            --brand-bg: #eef5fb;
            --brand-surface: #ffffff;
            --brand-surface-soft: #f8fafc;
            --brand-text: #102a43;
            --brand-text-muted: #475569;
            --brand-accent: #0b4a88;
            --brand-accent-soft: rgba(11, 74, 136, 0.12);
            --color-background: #e9eff6;
            --color-sura-blue: #0b4a88;
            --color-sura-cyan: #0ea5e9;
            --color-sura-cyan-dark: #0284c7;
            --color-sura-surface: #ffffff;
        }
        body {
            background: radial-gradient(circle at top left, rgba(14, 165, 233, 0.14), transparent 30%), var(--color-background);
            color: var(--brand-text);
            font-family: 'Inter', sans-serif;
        }
        main { background: var(--color-background); }
        .card, .panel, .modal-pane { background: var(--brand-surface); border: 1px solid rgba(148, 163, 184, 0.18); box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08); }
        .btn-primary { background: linear-gradient(135deg, var(--color-sura-blue) 0%, #1d4f91 100%); color: white; }
        .btn-secondary { background: #1f2937; color: white; }
    </style>
</head>
<body class="bg-[var(--color-background)] font-sans antialiased text-slate-900 h-screen flex overflow-hidden">
    
        {% include 'components/sidebar.html' %}

        <div class="flex-1 flex flex-col h-screen overflow-hidden relative">
        
                {% include 'components/navbar.html' %}

                <main class="flex-1 overflow-x-hidden overflow-y-auto bg-[var(--color-background)] p-6">
            <div class="container mx-auto max-w-7xl">
                {% block content %}
                {% endblock %}
            </div>
        </main>
    </div>

</body>
</html>
